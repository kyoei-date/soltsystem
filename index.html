<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>共栄商事 見積管理システム</title>
<!-- Firebase SDK v10 (modular → compat shim経由で使用) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;font-size:14px;color:#222;background:#f0f0ec}
.app{min-height:600px}
.topbar{background:#1a3a6b;padding:10px 18px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:15px;font-weight:500;color:#fff;display:flex;align-items:center;gap:8px;letter-spacing:.03em}
.saved-badge{font-size:11px;color:#7ecfa0;display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .4s}
.saved-badge.show{opacity:1}
.nav-tabs{background:#1d4480;display:flex;gap:0;padding:0 10px}
.tab{padding:10px 18px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;color:rgba(255,255,255,.65);transition:all .18s;white-space:nowrap;letter-spacing:.02em}
.tab.active{color:#fff;border-bottom-color:#f0c040}
.tab:hover:not(.active){color:#fff;background:rgba(255,255,255,.08)}
.content{padding:16px}
.card{background:#fff;border:1px solid #c8d4e8;border-radius:10px;padding:0;margin-bottom:16px;box-shadow:0 2px 8px rgba(26,58,107,.07);overflow:hidden}
.card-head{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(90deg,#1a3a6b 0%,#2a5298 100%);padding:10px 16px;letter-spacing:.04em}
.card-head i{font-size:16px;opacity:.9}
.card-body{padding:18px 18px 14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:0}
.form-group.full{grid-column:1/-1}
label{font-size:11px;color:#fff;font-weight:600;letter-spacing:.06em;background:#3a6abf;display:inline-block;padding:3px 10px 3px 10px;border-radius:4px 4px 0 0;width:fit-content;margin-bottom:0;line-height:1.6}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;padding:8px 11px;font-size:13px;border:2px solid #b8c8e0;border-radius:0 6px 6px 6px;background:#f8fafd;color:#1a2a44;font-family:inherit;transition:border-color .15s,background .15s;line-height:1.5}
textarea{resize:vertical;min-height:60px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1a3a6b;background:#fff;box-shadow:0 0 0 3px rgba(26,58,107,.1)}
.btn{padding:7px 16px;font-size:13px;border-radius:6px;cursor:pointer;border:1px solid #c8d4e0;background:#fff;color:#333;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:all .15s;font-weight:500}
.btn:hover{background:#f0f4f9;border-color:#1a3a6b}
.btn.primary{background:#1a3a6b;color:#fff;border-color:#1a3a6b}
.btn.primary:hover{background:#0f2550}
.btn.pdf{background:#c0392b;color:#fff;border-color:#c0392b}
.btn.pdf:hover{background:#a93226}
.btn.danger{color:#c0392b;border-color:transparent;background:transparent}
.btn.danger:hover{background:#fdf0ef}
.btn.sm{padding:4px 10px;font-size:11px}

/* New type selector buttons */
.type-select-area{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:8px}
.type-btn-big{background:#fff;border:2px solid #c8d4e0;border-radius:12px;padding:22px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:all .2s;font-family:inherit}
.type-btn-big:hover{border-color:#1a3a6b;background:#f0f4fc;transform:translateY(-2px);box-shadow:0 4px 12px rgba(26,58,107,.12)}
.type-btn-big .icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px}
.type-btn-big .label{font-size:14px;font-weight:500;color:#1a3a6b}
.type-btn-big .desc{font-size:11px;color:#888;text-align:center;line-height:1.5}
.type-btn-big.shio .icon{background:#e8f0fa;color:#1a3a6b}
.type-btn-big.nai .icon{background:#e8f5ee;color:#1b6b3a}
.type-btn-big.kaisou .icon{background:#fdf0e8;color:#6b3a1a}
.type-btn-big.shio{border-color:#b5cce8}
.type-btn-big.nai{border-color:#a0d4b5}
.type-btn-big.kaisou{border-color:#e0b88a}

.item-table{width:100%;border-collapse:collapse;font-size:13px}
.item-table thead tr{background:#1a3a6b}
.item-table th{padding:8px 8px;text-align:left;font-weight:500;font-size:12px;color:#fff;border:1px solid #1a3a6b}
.item-table tbody tr:nth-child(even){background:#f5f8fc}
.item-table tbody tr:hover{background:#eaf0fa}
.item-table td{padding:4px 4px;border:1px solid #9fb3cc;vertical-align:middle;background:#fff}
.item-table tbody tr:nth-child(even) td{background:#f5f8fc}
.item-table input{border:2px solid #b8c8e0;background:#f8fafd;width:100%;padding:5px 7px;font-size:13px;color:#1a2a44;font-family:inherit;border-radius:4px}
.item-table input:focus{background:#fff;border-color:#1a3a6b;outline:none;box-shadow:0 0 0 2px rgba(26,58,107,.12)}
.total-wrap{display:flex;justify-content:flex-end;margin-top:12px}
.total-box{background:#1a3a6b;border-radius:8px;padding:12px 20px;min-width:220px}
.total-row{display:flex;justify-content:space-between;gap:24px;padding:3px 0;font-size:13px;color:rgba(255,255,255,.8)}
.total-row.grand{font-size:16px;font-weight:500;border-top:1px solid rgba(255,255,255,.3);margin-top:6px;padding-top:8px;color:#f0c040}
.list-panel{display:flex;flex-direction:column;gap:8px}
.est-card{background:#fff;border:1px solid #d4dce8;border-radius:8px;padding:13px 15px;cursor:pointer;transition:all .18s;display:flex;justify-content:space-between;align-items:center}
.est-card:hover{border-color:#1a3a6b;box-shadow:0 2px 8px rgba(26,58,107,.1)}
.est-card.sel{border-color:#1a3a6b;border-width:2px;background:#f0f4fc}
.badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;letter-spacing:.03em;display:inline-flex;align-items:center;gap:3px}
.b-shio{background:#dce8f8;color:#1a3a6b;border:1px solid #b5cce8}
.b-nai{background:#d8f0e3;color:#1b6b3a;border:1px solid #8dd4ab}
.b-kaisou{background:#fde8d0;color:#8a3a00;border:1px solid #e0aa70}
.empty{text-align:center;padding:48px 20px;color:#888}
.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:.3}
.pdf-preview{background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.08)}

#addReceivedModal{display:none}
@media print{
  body{background:#fff!important;margin:0!important;padding:0!important}
  .app,.content{padding:0!important}
  .topbar,.nav-tabs,.no-print{display:none!important}
  .print-doc{display:block!important;margin:0;padding:0}
  .print-doc-inner{box-shadow:none!important;border:none!important}
  @page{size:A4 portrait;margin:0}
  #printArea{
    position:fixed;top:0;left:0;
    width:210mm;height:297mm;
    overflow:hidden;
    background:#fff;
  }
}
.print-doc{display:none}
.print-doc-inner{background:#fff;padding:56px 62px;box-sizing:border-box}

/* PDF layout */
.doc-title-center{text-align:center;font-size:22pt;font-weight:500;letter-spacing:.25em;padding:14px 0 10px;border-bottom:3px double #1a3a6b;margin-bottom:14px;color:#1a3a6b}
.doc-no-row{display:flex;justify-content:flex-end;gap:20px;font-size:11px;color:#555;margin-bottom:10px}
.doc-no-row span{font-weight:500;color:#222}
.doc-party{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1.5px solid #1a3a6b;margin-bottom:0}
.party-left{padding:14px 18px;border-right:1.5px solid #1a3a6b}
.party-right{padding:14px 18px;background:#f0f4fc;display:flex;flex-direction:column;gap:0}
.party-label{font-size:9px;color:#5a6a82;letter-spacing:.05em;margin-bottom:4px;font-weight:500;text-transform:uppercase}
.customer-name{font-size:15pt;font-weight:500;border-bottom:1.5px solid #1a3a6b;padding-bottom:6px;margin-bottom:8px;word-break:break-word;white-space:pre-wrap;line-height:1.5;overflow-wrap:break-word}
.greeting{font-size:10px;color:#444;line-height:1.9}
.company-name{font-size:13pt;font-weight:500;color:#1a3a6b}
.company-sub{font-size:9px;color:#555;line-height:2;margin-top:3px;margin-bottom:10px}
.stamp-row{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid #bcd;margin-top:4px}
.stamp-cell{text-align:center;padding:4px 0;font-size:9px;color:#5a6a82;border-right:1px solid #bcd}
.stamp-cell:last-child{border-right:none}
.stamp-box{height:32px;border-top:1px solid #bcd;margin-top:2px;font-size:12px;color:#333;display:flex;align-items:center;justify-content:center}
.conditions-band{background:#f0f4fc;border:1.5px solid #1a3a6b;border-top:none;padding:10px 18px;display:grid;grid-template-columns:1fr 1fr;gap:4px 30px}
.cond-row{display:flex;gap:8px;font-size:11px;padding:3px 0;border-bottom:.5px solid rgba(26,58,107,.15)}
.cond-key{color:#1a3a6b;font-weight:500;min-width:82px;flex-shrink:0}
.cond-val{color:#333}
.items-section{margin-top:14px}
.items-title{background:#1a3a6b;color:#fff;font-size:11px;font-weight:500;padding:5px 12px;letter-spacing:.05em}
.items-table{width:100%;border-collapse:collapse;font-size:11px}
.items-table th{background:#2d5aa0;color:#fff;padding:7px 10px;text-align:left;border:1px solid #1a3a6b;font-weight:500}
.items-table th.right{text-align:right}
.items-table td{padding:7px 10px;border:1px solid #c8d4e8}
.items-table td.right{text-align:right}
.items-table tr:nth-child(even) td{background:#f5f8fc}
.total-section{border:1.5px solid #1a3a6b;border-top:none}
.total-inner{display:flex;justify-content:flex-end;padding:10px 18px}
.total-grid{display:grid;grid-template-columns:130px 120px;font-size:11px}
.total-grid .tk{color:#1a3a6b;font-weight:500;padding:3px 0;border-bottom:.5px solid #c8d4e8}
.total-grid .tv{text-align:right;padding:3px 0;border-bottom:.5px solid #c8d4e8}
.total-grid .grand-k{font-size:14px;font-weight:500;color:#1a3a6b;padding:6px 0 2px;border-bottom:none}
.total-grid .grand-v{font-size:14px;font-weight:500;color:#1a3a6b;text-align:right;padding:6px 6px 2px;border-bottom:none;background:#f0f4fc}
.remarks-section{margin-top:12px;padding:10px 14px;background:#fffdf0;border:1px solid #e0d08a;border-radius:4px;font-size:10px;color:#555;line-height:1.8}
.kaisou-section{margin-top:12px;border:1.5px solid #1a3a6b}
.kaisou-section-title{background:#1a3a6b;color:#fff;font-size:11px;font-weight:500;padding:5px 12px}
.kaisou-row{display:flex;gap:0;border-bottom:1px solid #c8d4e8;font-size:11px}
.kaisou-row:last-child{border-bottom:none}
.kaisou-key{background:#f0f4fc;color:#1a3a6b;font-weight:500;width:110px;padding:7px 10px;border-right:1.5px solid #c8d4e8;border-bottom:1px solid #c8d4e8;vertical-align:top}
.kaisou-val{padding:7px 10px;color:#333;line-height:1.7;border-bottom:1px solid #c8d4e8;vertical-align:top}
.kaisou-section table tr:last-child .kaisou-key,
.kaisou-section table tr:last-child .kaisou-val{border-bottom:none}

/* ── スマホ専用UI ── */
/* スマホ専用要素はJS側で制御 */
.sp-bottom-nav{display:none}
.sp-more-menu{display:none}
.sp-more-overlay{display:none}

@media(max-width:640px){
  /* アプリ全体 */
  .app{min-height:100dvh;padding-bottom:64px}

  /* トップバー：スマホ用コンパクト */
  .topbar{padding:8px 12px}
  .topbar-title{font-size:13px}

  /* PC用ナビタブを非表示 */
  .nav-tabs{display:none!important}

  /* コンテンツ余白 */
  .content{padding:10px 8px}

  /* カード */
  .card-body{padding:12px 10px 10px}

  /* フォーム：1列 */
  .form-grid{grid-template-columns:1fr}
  .form-grid-3{grid-template-columns:1fr}

  /* 種別選択：縦並び */
  .type-select-area{grid-template-columns:1fr}

  /* 品目テーブル：横スクロール */
  .item-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .item-table{min-width:520px}

  /* 合計ボックス：全幅 */
  .total-wrap{justify-content:stretch}
  .total-box{min-width:unset;width:100%}

  /* 見積カード */
  .est-card{flex-direction:column;align-items:flex-start;gap:8px}
  .est-card > div:last-child{width:100%;flex-direction:row;flex-wrap:wrap;justify-content:flex-end}

  /* 受領書・納品書2カラム→1カラム */
  .doc-split{grid-template-columns:1fr !important}
  .doc-split-list{max-height:200px !important}

  /* ── スマホ下部ナビゲーション ── */
  .sp-bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:#1a3a6b;z-index:1000;
    box-shadow:0 -2px 12px rgba(0,0,0,.25);
    height:64px;
  }
  .sp-nav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:2px;cursor:pointer;
    color:rgba(255,255,255,.55);font-size:9px;font-weight:500;
    border:none;background:transparent;font-family:inherit;
    padding:0;transition:color .15s;letter-spacing:.02em;
    -webkit-tap-highlight-color:transparent;
  }
  .sp-nav-item i{font-size:22px;line-height:1}
  .sp-nav-item.active{color:#f0c040}
  .sp-nav-item span{margin-top:1px}

  /* スマホ用ページヘッダー */
  .sp-page-header{
    display:flex;align-items:center;gap:10px;
    padding:12px 12px 8px;
    font-size:15px;font-weight:600;color:#1a3a6b;
    border-bottom:2px solid #e0e8f4;margin-bottom:4px;
  }
  .sp-page-header i{font-size:20px}

  /* スマホ用FAB（新規作成ボタン） */
  .sp-fab{
    position:fixed;right:16px;bottom:76px;
    width:52px;height:52px;border-radius:50%;
    background:#1a3a6b;color:#fff;border:none;
    font-size:26px;cursor:pointer;
    box-shadow:0 4px 16px rgba(26,58,107,.4);
    display:flex;align-items:center;justify-content:center;
    z-index:999;-webkit-tap-highlight-color:transparent;
  }

  /* スマホ用見積カード */
  .sp-est-card{
    background:#fff;border:1px solid #d4dce8;border-radius:10px;
    padding:14px 14px 10px;margin-bottom:8px;
    box-shadow:0 1px 4px rgba(26,58,107,.06);
    -webkit-tap-highlight-color:transparent;
  }
  .sp-est-card:active{background:#f5f8fc}
  .sp-est-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
  .sp-est-card-no{font-size:12px;color:#5a6a82;font-weight:500}
  .sp-est-card-customer{font-size:15px;font-weight:600;color:#1a2a44;margin:2px 0 6px}
  .sp-est-card-meta{display:flex;gap:8px;align-items:center;font-size:11px;color:#7a8a9a;flex-wrap:wrap}
  .sp-est-card-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #eef1f6}

  /* スマホ用サブメニュー（「その他」タブ） */
  .sp-more-menu{
    position:fixed;bottom:64px;left:0;right:0;
    background:#fff;border-top:1px solid #e0e8f4;
    box-shadow:0 -4px 20px rgba(0,0,0,.15);
    z-index:1001;padding:8px 0 8px;
    border-radius:16px 16px 0 0;
    transform:translateY(100%);transition:transform .25s ease;
  }
  .sp-more-menu.open{transform:translateY(0)}
  .sp-more-item{
    display:flex;align-items:center;gap:14px;
    padding:14px 20px;font-size:14px;color:#1a2a44;
    cursor:pointer;-webkit-tap-highlight-color:transparent;
    border:none;background:transparent;font-family:inherit;width:100%;
  }
  .sp-more-item:active{background:#f5f8fc}
  .sp-more-item i{font-size:20px;color:#1a3a6b;width:24px;text-align:center}
  .sp-more-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1000;
  }
  .sp-more-overlay.open{display:block}

  /* スマホ用フォームボタン群 */
  .sp-form-actions{
    display:flex;flex-direction:column;gap:8px;
    padding:12px 0 4px;
  }
  .sp-form-actions .btn{width:100%;justify-content:center;padding:12px}

  /* スマホ用「戻るヘッダー」 */
  .sp-back-header{
    display:flex;align-items:center;gap:8px;
    padding:10px 12px;background:#1a3a6b;color:#fff;
    font-size:14px;font-weight:500;cursor:pointer;
  }
  .sp-back-header i{font-size:18px}
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<!-- ログイン画面 -->
<div id="loginScreen" style="display:flex;position:fixed;inset:0;background:linear-gradient(135deg,#0f2550 0%,#1a3a6b 50%,#2a5298 100%);z-index:9999;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:40px 36px;width:360px;max-width:92vw;box-shadow:0 16px 48px rgba(0,0,0,.3)">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:22px;font-weight:600;color:#1a3a6b;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px"><i class="ti ti-building-store"></i>共栄商事</div>
      <div style="font-size:13px;color:#5a6a82">見積管理システム</div>
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:11px;color:#fff;font-weight:600;letter-spacing:.06em;background:#3a6abf;display:inline-block;padding:3px 10px;border-radius:4px 4px 0 0">メールアドレス（ID）</label>
      <input type="text" id="loginId" placeholder="例：yamada@kyoeishoji.co.jp" style="width:100%;padding:8px 11px;font-size:13px;border:2px solid #b8c8e0;border-radius:0 6px 6px 6px;background:#f8fafd;color:#1a2a44;font-family:inherit" onkeydown="if(event.key==='Enter')document.getElementById('loginPw').focus()">
    </div>
    <div style="margin-bottom:18px">
      <label style="font-size:11px;color:#fff;font-weight:600;letter-spacing:.06em;background:#3a6abf;display:inline-block;padding:3px 10px;border-radius:4px 4px 0 0">パスワード</label>
      <input type="password" id="loginPw" placeholder="パスワードを入力" style="width:100%;padding:8px 11px;font-size:13px;border:2px solid #b8c8e0;border-radius:0 6px 6px 6px;background:#f8fafd;color:#1a2a44;font-family:inherit" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div id="loginErr" style="color:#c0392b;font-size:12px;margin-bottom:10px;min-height:16px;text-align:center"></div>
    <button onclick="doLogin()" style="width:100%;padding:11px;background:#1a3a6b;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px"><i class="ti ti-login"></i>ログイン</button>
    <!-- Firebase未設定の場合の案内 -->
    <div id="fbNotConfigured" style="display:none;margin-top:16px;padding:10px 12px;background:#fff8e1;border:1px solid #ffe082;border-radius:8px;font-size:11px;color:#7a5c00;line-height:1.7">
      <i class="ti ti-alert-triangle" style="color:#f0a500"></i>
      <strong>Firebaseが未設定です。</strong><br>
      設定手順：<a href="https://console.firebase.google.com/" target="_blank" style="color:#1a3a6b">Firebase Console</a> でプロジェクトを作成し、下記スクリプト内の <code>FIREBASE_CONFIG</code> を書き換えてください。
    </div>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <div class="topbar no-print">

function openEditUser(i){
  editUserIdx=i;
  const u = FB_READY ? _adminUsers[i] : getUsers()[i];

  document.getElementById('editUserCard').style.display='';
  document.getElementById('editUserId').value=u.email||u.id||'';
  document.getElementById('editUserName').value=u.name||'';
  document.getElementById('editUserPw').value='';
  document.getElementById('editUserPw2').value='';
  document.getElementById('editUserErr').textContent='';
  // 管理者チェックボックスの状態を設定
  const adminCb=document.getElementById('editUserIsAdmin');
  if(adminCb) adminCb.checked=!!u.isAdmin;
  document.getElementById('editUserCard').scrollIntoView({behavior:'smooth',block:'start'});
}
function closeEditUser(){
  editUserIdx=null;
  document.getElementById('editUserCard').style.display='none';
}
async function saveEditUser(){
  const newName=document.getElementById('editUserName').value.trim();
  const newPw=document.getElementById('editUserPw').value;
  const newPw2=document.getElementById('editUserPw2').value;
  const err=document.getElementById('editUserErr');
  const adminCb=document.getElementById('editUserIsAdmin');
  const newIsAdmin=adminCb?adminCb.checked:false;
  err.style.color='#c0392b';
  if(newPw&&newPw!==newPw2){err.textContent='パスワードが一致しません';return;}
  if(newPw&&newPw.length<6){err.textContent='パスワードは6文字以上にしてください';return;}
  const saveBtn=document.querySelector('#editUserCard .btn.primary');
  if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='保存中…';}
  try{
    if(FB_READY){
      const u=_adminUsers[editUserIdx];
      if(!u){err.textContent='ユーザーが見つかりません';return;}
      // Firestoreのメタ情報を更新
      await db.collection('users').doc(u._docId).update({
        name:newName,
        isAdmin:newIsAdmin
      });
      err.style.color='#1b6b3a';
      err.textContent='✓ 保存しました';
      // ログイン中のユーザーが自分自身を編集した場合、ヘッダーも更新
      if(AUTH.currentUser&&(AUTH.currentUser.uid===u._docId||AUTH.currentUser.id===(u.email||u.id))){
        AUTH.currentUser={...AUTH.currentUser,name:newName};
        AUTH.isAdmin=newIsAdmin;
        document.getElementById('userLabel').textContent=newName||(u.email||u.id);
      }
      await refreshAdminUserList();
      setTimeout(()=>closeEditUser(),800);
    }else{
      const newId=document.getElementById('editUserId').value.trim();
      if(!newId){err.textContent='メールアドレスは必須です';return;}
      const users=getUsers();
      const target=users[editUserIdx];
      if(users.some((u,i)=>u.id===newId&&i!==editUserIdx)){err.textContent='このIDはすでに使用されています';return;}
      users[editUserIdx]={...target,id:newId,name:newName,isAdmin:newIsAdmin,...(newPw?{pw:newPw}:{})};
      saveUsers(users);
      if(AUTH.currentUser&&AUTH.currentUser.id===target.id){
        AUTH.currentUser={...AUTH.currentUser,id:newId,name:newName};
        AUTH.isAdmin=newIsAdmin;
        document.getElementById('userLabel').textContent=newName||newId;
      }
      closeEditUser();
      render();
    }
  }catch(e){
    err.textContent='エラー: '+e.message;
  }finally{
    if(saveBtn){saveBtn.disabled=false;saveBtn.innerHTML='<i class="ti ti-device-floppy"></i>保存';}
  }
}

async function addUser(){
  const id=document.getElementById('newUserId').value.trim();
  const name=document.getElementById('newUserName').value.trim();
  const pw=document.getElementById('newUserPw').value;
  const pw2=document.getElementById('newUserPw2').value;
  const err=document.getElementById('addUserErr');
  if(!id||!pw){err.textContent='IDとパスワードは必須です';return;}
  if(pw!==pw2){err.textContent='パスワードが一致しません';return;}
  if(pw.length<6){err.textContent='パスワードは6文字以上にしてください';return;}

  if(FB_READY){
    // Firebase Auth でユーザー作成（管理者権限が必要）
    // ※ Client SDKではAdmin権限がないためCloud Functions必須
    //   暫定対応: Firebase AuthのREST API経由で作成
    const btn=document.getElementById('addUserBtn');
    if(btn){btn.disabled=true;btn.textContent='作成中…';}
    try{
      // 現在のユーザーのIDトークンを取得
      const token = await fbAuth.currentUser.getIdToken();
      // Firebase Auth REST API でユーザー作成
      const resp = await fetch(
        `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${FIREBASE_CONFIG.apiKey}`,
        {method:'POST',headers:{'Content-Type':'application/json'},
         body:JSON.stringify({email:id,password:pw,returnSecureToken:false})}
      );
      const result = await resp.json();
      if(result.error){
        const msg={
          'EMAIL_EXISTS':'このメールアドレスはすでに登録されています',
          'WEAK_PASSWORD : Password should be at least 6 characters':'パスワードは6文字以上必要です',
          'INVALID_EMAIL':'メールアドレスの形式が正しくありません',
        }[result.error.message]||('エラー: '+result.error.message);
        err.textContent=msg; return;
      }
      // Firestore にメタ情報保存
      await db.collection('users').doc(result.localId||id).set({email:id,name,isAdmin:false});
      err.style.color='#1b6b3a';
      err.textContent='✓ ユーザーを追加しました';
      document.getElementById('newUserId').value='';

async function migrateLocalToFirestore(){
  if(!FB_READY){alert('Firebaseが設定されていません');return;}
  const msg=document.getElementById('migrateMsg');
  if(!confirm('localStorageのデータをFirestoreに移行します。\n既存のFirestoreデータは上書きされます。\n続行しますか？'))return;
  msg.style.color='#1a3a6b'; msg.textContent='移行中…';
  try{
    const localEst=JSON.parse(localStorage.getItem('kyoei3')||'[]');
    const localRec=JSON.parse(localStorage.getItem('kyoei3r')||'[]');
    if(localEst.length===0&&localRec.length===0){
      msg.style.color='#7a5c00'; msg.textContent='移行するlocalStorageデータがありません。';
      return;
    }
    S.estimates=localEst;
    S.receivedEstimates=localRec;
    await sv();
    await svR();
    msg.style.color='#1b6b3a';
    msg.textContent=`✓ 移行完了：見積 ${localEst.length}件 ／ 受領見積 ${localRec.length}件 をFirestoreに保存しました。`;
  }catch(e){
    msg.style.color='#c0392b'; msg.textContent='エラー: '+e.message;
  }
}

async function doChangePw(){
  const cur=document.getElementById('curPw').value;
  const nw=document.getElementById('newPw').value;
  const nw2=document.getElementById('newPw2').value;
  const msg=document.getElementById('pwChangeMsg');
  if(!cur||!nw||!nw2){msg.style.color='#c0392b';msg.textContent='すべての項目を入力してください';return;}
  if(nw!==nw2){msg.style.color='#c0392b';msg.textContent='新しいパスワードが一致しません';return;}
  if(nw.length<6){msg.style.color='#c0392b';msg.textContent='パスワードは6文字以上にしてください';return;}

  if(FB_READY){
    try{
      const user=fbAuth.currentUser;
      // 再認証（Firebase要件）
      const cred=firebase.auth.EmailAuthProvider.credential(user.email, cur);
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(nw);
      document.getElementById('curPw').value='';
      document.getElementById('newPw').value='';
      document.getElementById('newPw2').value='';
      msg.style.color='#1b6b3a';msg.textContent='✓ パスワードを変更しました';

      }[e.code]||('エラー: '+e.message);

    if(nw.length<4){msg.style.color='#c0392b';msg.textContent='パスワードは4文字以上にしてください';return;}
    const users=getUsers();

// Firestoreは1件ずつドキュメントで保存（見積番号 no をドキュメントIDに使用）
async function sv(){
  if(FB_READY){
    try{
      // S.estimates を全件 Firestore に書き込む（差分ではなく上書き）
      const batch = db.batch();
      // 既存ドキュメントを全削除してから書き直す（シンプル戦略）
      const snap = await db.collection('estimates').get();
      snap.docs.forEach(d=>batch.delete(d.ref));
      S.estimates.forEach((e,i)=>{
        const docId = e.no ? e.no.replace(/[^a-zA-Z0-9\-_]/g,'_') : 'est_'+i;
        const ref = db.collection('estimates').doc(docId);
        batch.set(ref, {...e, _updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
      });
      await batch.commit();
      showSaved();
    }catch(e){
      console.error('[kyoei] 保存エラー',e);
      alert('保存に失敗しました。\n'+e.message);
    }
  }else{
    try{localStorage.setItem('kyoei3',JSON.stringify(S.estimates));showSaved();}catch(e){}
  }
}

function applyA4Scale(pa){
  const inner=pa.querySelector('.print-doc-inner');
  if(!inner)return;
  // まずスケールをリセットして自然サイズを計測
  inner.style.transform='none';
  inner.style.width='';
  inner.style.height='';
  // A4サイズ（px換算: 96dpi基準）
  const a4w=794; // 210mm ≈ 794px
  const a4h=1123; // 297mm ≈ 1123px
  inner.style.width=a4w+'px';
  inner.style.boxSizing='border-box';
  // レイアウト確定を待って高さを計測
  const contentH=inner.scrollHeight;
  const contentW=inner.scrollWidth;
  const scaleH=a4h/contentH;
  const scaleW=a4w/contentW;
  const scale=Math.min(scaleH,scaleW); // 縦横両方収まる最大スケール
  inner.style.transform=`scale(${scale})`;
  inner.style.transformOrigin='top left';
  // スケール後の実サイズに合わせてコンテナを調整
  inner.style.width=(a4w/scale)+'px';
  pa.style.width=a4w+'px';
  pa.style.height=a4h+'px';
  pa.style.overflow='hidden';
  pa.style.position='fixed';
  pa.style.top='0';
  pa.style.left='0';
}

function resetPrintArea(pa){
  const inner=pa.querySelector('.print-doc-inner');
  if(inner){inner.style.transform='';inner.style.width='';inner.style.height='';}
  pa.style.display='none';

  document.querySelector('.app').style.display='';
}

  const showTxt = opts.showTxt  !== false;
  const fontSize= opts.fontSize || 9;

  // Code 128B シンボルテーブル (index 0〜102, 各11モジュール)
  // ※ STOP(index 106)は7要素 2331112 のため別定義
  const TABLE = [
    212222,222122,222221,121223,121322,131222,122213,122312,132212,221213,
    221312,231212,112232,122132,122231,113222,123122,123221,223211,221132,
    221231,213212,223112,312131,311222,321122,321221,312212,322112,322211,
    212123,212321,232121,111323,131123,131321,112313,132113,132311,211313,
    231113,231311,112133,112331,132131,113123,113321,133121,313121,211331,
    231131,213113,213311,213131,311123,311321,331121,312113,312311,332111,
    314111,221411,431111,111224,111422,121124,121421,141122,141221,112214,
    112412,122114,122411,142112,142211,241211,221114,413111,241112,134111,
    111242,121142,121241,114212,124112,124211,411212,421112,421211,212141,
    214121,412121,111143,111341,131141,114113,114311,411113,411311,113141,
    114131,311141,411131,211412,211214,211232
  ];
  const STOP_PAT = [2,3,3,1,1,1,2]; // STOPは7要素・13モジュール
  const START_B  = 104;              // START B のシンボル番号

  function pat6(v){ return String(v).padStart(6,'0').split('').map(Number); }

  // チェックサム: START_B + Σ(文字インデックス × 位置) mod 103
  const chars = text.split('').map(c => c.charCodeAt(0) - 32);
  let cs = START_B;
  chars.forEach((ci, i) => { cs += ci * (i + 1); });
  cs = cs % 103;

  // バー列を構築
  // 通常シンボル: 奇数インデックス=バー、偶数=スペース
  const bars = [];
  let x = 0;
  function drawPat(pat){
    pat.forEach((w, j) => {
      const px = w * xScale;
      if(j % 2 === 0) bars.push({ x, w: px }); // バー
      x += px;
    });
  }

  // START B
  drawPat(pat6(TABLE[START_B]));
  // データ文字
  chars.forEach(ci => drawPat(pat6(TABLE[ci])));
  // チェックサム
  drawPat(pat6(TABLE[cs]));
  // STOP (7要素)
  drawPat(STOP_PAT);

  // quiet zone: 左右に10モジュール分の余白を追加
  const qz    = 10 * xScale;
  const totalW = Math.ceil(x + qz * 2);
  const totalH = barH + (showTxt ? fontSize + 4 : 0);

  const rects = bars.map(b =>
    `<rect x="${(b.x + qz).toFixed(2)}" y="0" width="${b.w.toFixed(2)}" height="${barH}" fill="#000"/>`
  ).join('');
  const label = showTxt
    ? `<text x="${(totalW/2).toFixed(1)}" y="${barH + fontSize + 1}" text-anchor="middle" font-family="monospace" font-size="${fontSize}" fill="#333">${text}</text>`
    : '';

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" style="background:#fff">${rects}${label}</svg>`;
}

function buildPrintDoc(e,docName,deliveryAddr){
  deliveryAddr=deliveryAddr||'';
  const sub=calcSub(e.items),tax=Math.round(sub*.1),grand=sub+tax;
  const isEst=docName==='見積書';
  const isKaisou=e.type==='kaisou';
  const title=isEst?'御　見　積　書':
    docName==='受領書'?'受　領　書':docName==='請求書'?'請　求　書':'納　品　書';

  // 右側：見積人ブロック（会社情報 + 承認・調査・作成）

    <div class="party-right">
      <div>
        <div style="display:flex;justify-content:space-between;align-items:flex-start">

          <div style="font-size:10px;color:#555">日付：<span style="color:#222;font-weight:500">${e.date}</span></div>
        </div>

        <div class="company-sub">${CO.addr}<br>${CO.tel}</div>
      </div>
      <div class="stamp-row">
        <div class="stamp-cell">承　認<div class="stamp-box">${e.approved||''}</div></div>
        <div class="stamp-cell">調　査<div class="stamp-box">${e.checked||''}</div></div>
        <div class="stamp-cell">作　成<div class="stamp-box">${e.created||''}</div></div>

    </div>`;

  // 左側：宛先ブロック
  const greeting=isKaisou&&isEst
    ?`<p style="font-size:10px;color:#444;line-height:1.9;margin-bottom:4px">　拝啓　貴社ますますご清祥のこととお喜び申し上げます。</p>
       <p style="font-size:10px;color:#444;line-height:1.9;margin-bottom:4px">　さて、ご照会頂きました海上輸送に関し下記の通り御見積申し上げます。</p>
       <p style="font-size:10px;color:#444;text-align:right">何卒御用命下さいます様ご検討の程お願い申し上げます。　敬　具</p>`
    :isEst
    ?`<p style="font-size:10px;color:#444;line-height:1.9">ご照会の件下記の通り御見積申し上げます。<br>何卒御用命下さいます様お願い申し上げます。</p>`
    :'';
  const refText=e.ref||`${e.date}付のご照会の件`;
  const deliveryAddrHtml=!isEst&&deliveryAddr
    ?`<div style="font-size:10px;color:#333;margin-top:6px;margin-bottom:2px;line-height:1.8"><span style="color:#5a6a82;font-weight:500;font-size:9px;letter-spacing:.04em;display:block;margin-bottom:2px">お届け先</span>${deliveryAddr.replace(/\n/g,'<br>')}</div>`
    :'';
  const partyLeft=`
    <div class="party-left">
      <div class="party-label">宛　先</div>
      <div class="customer-name" style="${!(e.customer||'').includes('\n')?'white-space:nowrap;overflow:hidden;text-overflow:ellipsis':''}">${e.customer||'　'}　御中</div>
      ${deliveryAddrHtml}
      ${isEst?`<div style="font-size:10px;color:#666;margin-bottom:8px">${refText}</div>`:''}
      ${greeting}
    </div>`;

  // 条件欄
  const nl2br=s=>(s||'').replace(/\n/g,'<br>');
  const condRows=isKaisou?[]:e.type==='nai'?([
    {k:'納期',v:nl2br(e.deliveryDate)},{k:'受渡場所',v:nl2br(e.receivePlace)},
    {k:'発注ロット',v:nl2br(e.lot)},{k:'受渡条件',v:nl2br(e.receive)},
    {k:'御支払条件',v:nl2br(e.payment)},{k:'見積有効期間',v:nl2br(e.valid)},
    {k:'その他',v:nl2br(e.note)}
  ].filter(c=>c.v)):([
    {k:'受渡期限',v:nl2br(e.delivery)},{k:'納期',v:nl2br(e.deliveryDate)},{k:'発注ロット',v:nl2br(e.lot)},
    {k:'受渡条件',v:nl2br(e.receive)},{k:'御支払条件',v:nl2br(e.payment)},
    {k:'見積有効期間',v:nl2br(e.valid)},{k:'その他',v:nl2br(e.note)}
  ].filter(c=>c.v));

  // 品目テーブル
  let itemsBlock='';

    </tr></thead><tbody>
      ${(()=>{const rows=e.items;let last=-1;rows.forEach((it,i)=>{if(it.name)last=i;});return rows.slice(0,last+1).map(it=>it.name?`<tr><td>${it.name}</td><td>${it.spec||''}</td><td class="right">${it.qty||''}</td><td>${it.unit||''}</td><td></td></tr>`:`<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>`).join('');})()}
    </tbody></table>`;
  }else if(docName!=='見積書'||!isKaisou){
    itemsBlock=`<table class="items-table"><thead><tr>
      <th style="width:36%">品名</th><th style="width:13%">規格</th><th class="right" style="width:9%">数量</th><th style="width:7%">単位</th><th class="right" style="width:13%">単価（円）</th><th class="right" style="width:16%">金額（円）</th>
    </tr></thead><tbody>
      ${(()=>{const rows=e.items;let last=-1;rows.forEach((it,i)=>{if(it.name)last=i;});return rows.slice(0,last+1).map(it=>it.name?`<tr><td>${it.name}</td><td>${it.spec||''}</td><td class="right">${it.qty||''}</td><td>${it.unit||''}</td><td class="right">${fmt(it.price)}</td><td class="right">${fmt(it.amount)}</td></tr>`:`<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td></tr>`).join('');})()}
    </tbody></table>`;
  }

  const totalBlock=docName==='納品書'?'':`
    <div class="total-section">
      <div class="total-inner">
        <div class="total-grid">
          <div class="tk">小計</div><div class="tv">¥ ${fmt(sub)}</div>
          <div class="tk">消費税（10%）</div><div class="tv">¥ ${fmt(tax)}</div>
          <div class="grand-k">合　計</div><div class="grand-v">¥ ${fmt(grand)}</div>
        </div>
      </div>
    </div>`;

  let kaisouSection='';
  if(isKaisou&&isEst){
    const rows=[
      {k:'１．品名',v:e.items.map(it=>it.name).filter(Boolean).join('、')},
      {k:'２．使用船舶',v:e.kaisouShip||''},
      {k:'３．海上運賃',v:[e.kaisouFare1?'①'+(e.kaisouFareLabel1||'')+'　'+fmt(e.kaisouFare1)+'円':'' ,e.kaisouFare2?'②'+(e.kaisouFareLabel2||'')+'　'+fmt(e.kaisouFare2)+'円':'',e.kaisouFare3?'③'+(e.kaisouFareLabel3||'')+'　'+fmt(e.kaisouFare3)+'円':''].filter(Boolean).join('<br>')},
      {k:'４．航路',v:e.kaisouRoute||''},
      {k:'５．適用開始時期',v:nl2br(e.delivery)},
      {k:'６．付帯条件',v:nl2br(e.kaisouConditions)},
      {k:'７．支払条件',v:nl2br(e.payment)},
      {k:'８．その他',v:nl2br(e.note)},
    ].filter(r=>r.v);
    kaisouSection=`<div class="kaisou-section">
      <table style="width:100%;border-collapse:collapse;font-size:11px">
        ${rows.map(r=>`<tr>
          <td class="kaisou-key">${r.k}</td>
          <td class="kaisou-val">${r.v}</td>
        </tr>`).join('')}
      </table>
    </div>`;
  }

  // バーコード（納品書・受領書のみ）
  const barcodeBlock = (docName==='納品書'||docName==='受領書') && e.no
    ? `<div style="margin-top:14px;display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        <div style="font-size:8px;color:#8a9ab5;letter-spacing:.06em;text-align:right">見積No.</div>
        ${genCode128SVG(e.no,{height:48,xScale:2.0,fontSize:9})}
      </div>`
    : '';

  return`<div class="print-doc-inner">
    <div class="doc-title-center" style="display:flex;align-items:center;justify-content:center;position:relative">
      <span>${title}</span>
      <span style="position:absolute;right:0;font-size:11px;font-weight:400;letter-spacing:normal;color:#555">No.&nbsp;<span style="color:#222;font-weight:500">${e.no}</span></span>
    </div>
    <div class="doc-party">${partyLeft}${partyRight}</div>
    ${condRows.length?`<div class="conditions-band">${condRows.map(c=>`<div class="cond-row"><span class="cond-key">${c.k}</span><span class="cond-val">${c.v}</span></div>`).join('')}</div>`:''}
    ${!isKaisou||docName!=='見積書'?`<div class="items-section"><div class="items-title">品　目　明　細</div>${itemsBlock}</div>${totalBlock}`:''}
    ${kaisouSection}
    ${e.remarks?`<div class="remarks-section">${e.remarks.replace(/\n/g,'<br>')}</div>`:''}
    ${barcodeBlock}
  </div>`;
}

function render(){
  const c=document.getElementById('main');if(!c)return;
  const mob=isMobile();
  if(S.tab==='list')c.innerHTML=mob?renderListSP():renderList();
  else if(S.tab==='new')c.innerHTML=renderNew();
  else if(S.tab==='received')c.innerHTML=renderReceived();
  else if(S.tab==='help')c.innerHTML=renderHelp();
  else if(S.tab==='admin')c.innerHTML=renderAdmin();
  else if(S.tab==='settings')c.innerHTML=renderSettings();
  else c.innerHTML=renderDocTab(S.tab);
  // 備考欄の高さをコンテンツに合わせて自動調整（入力・閲覧両モード）
  var ta=document.getElementById('remarksTA');
  if(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
}

function renderListSP(){
  const q=(S.searchQ||'').trim().toLowerCase();
  const fyYears=getFiscalYears(S.estimates);
  if(S.fiscalYear!==0&&!fyYears.includes(S.fiscalYear))S.fiscalYear=0;
  const filtered=S.estimates.map((e,i)=>({e,i})).filter(({e})=>{
    if(S.fiscalYear!==0&&getFiscalYear(e.date)!==S.fiscalYear)return false;
    if(!q)return true;
    const amtNum=e.type==='kaisou'?calcKaisouTotal(e):calcSub(e.items);
    return (e.no||'').toLowerCase().includes(q)
      ||(e.customer||'').toLowerCase().includes(q)
      ||(e.date||'').includes(q)
      ||fmt(amtNum).includes(q)
      ||String(amtNum).includes(q)
      ||(e.created||'').toLowerCase().includes(q)
      ||typeLabel(e.type).toLowerCase().includes(q);
  });

  if(!S.estimates.length) return`
    <div class="sp-page-header"><i class="ti ti-list-details"></i>見積一覧</div>
    <div class="empty"><i class="ti ti-file-off"></i>見積書がまだありません</div>`;

  const cards=filtered.map(({e,i})=>{
    const amtNum=e.type==='kaisou'?calcKaisouTotal(e):calcSub(e.items);
    const amtStr=amtNum?fmt(amtNum)+'円':'―';
    const dateStr=e.date?e.date.replace(/-/g,'/'):'';
    return`<div class="sp-est-card" onclick="viewEst(${i})">
      <div class="sp-est-card-top">
        <span class="sp-est-card-no">No. ${e.no||'―'}</span>
        ${typeBadge(e.type)}
      </div>
      <div class="sp-est-card-customer">${(e.customer||'（宛先未入力）').replace(/\n/g,' ')}</div>
      <div class="sp-est-card-meta">
        <span><i class="ti ti-calendar" style="font-size:11px"></i> ${dateStr}</span>
        <span style="font-weight:600;color:#1a3a6b">${amtStr}</span>
        ${e.created?`<span><i class="ti ti-user" style="font-size:11px"></i> ${e.created}</span>`:''}
      </div>
      <div class="sp-est-card-actions">
        <button class="btn sm" style="flex:1;justify-content:center" onclick="event.stopPropagation();editEst(${i})"><i class="ti ti-edit"></i>修正</button>
        <button class="btn sm" style="flex:1;justify-content:center" onclick="event.stopPropagation();copyEst(${i})"><i class="ti ti-copy"></i>コピー</button>
        <button class="btn sm pdf" style="flex:1;justify-content:center" onclick="event.stopPropagation();printEst(${i})"><i class="ti ti-printer"></i>印刷</button>
        <button class="btn sm danger" onclick="event.stopPropagation();delEst(${i})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('');

  const noResult=filtered.length===0&&q?`<div class="empty" style="padding:32px 20px"><i class="ti ti-search-off" style="font-size:28px;display:block;margin-bottom:8px;opacity:.3"></i>「${q}」に一致する見積書はありません</div>`:'';

  return`

      <div style="position:relative">
        <i class="ti ti-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8a9ab5;font-size:15px;pointer-events:none"></i>

function renderListInPlace(){
  const q=(S.searchQ||'').trim().toLowerCase();
  const filtered=S.estimates.map((e,i)=>({e,i})).filter(({e})=>{
    if(S.fiscalYear!==0&&getFiscalYear(e.date)!==S.fiscalYear)return false;
    if(!q)return true;
    const amtNum=e.type==='kaisou'?calcKaisouTotal(e):calcSub(e.items);
    return (e.no||'').toLowerCase().includes(q)
      ||(e.customer||'').toLowerCase().includes(q)
      ||(e.date||'').includes(q)
      ||fmt(amtNum).includes(q)
      ||String(amtNum).includes(q)
      ||(e.created||'').toLowerCase().includes(q)
      ||typeLabel(e.type).toLowerCase().includes(q);
  });
  const cards=filtered.map(({e,i})=>{
    const amtNum=e.type==='kaisou'?calcKaisouTotal(e):calcSub(e.items);
    const amtLabel=e.type==='kaisou'&&amtNum?`<div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">
        <span style="font-size:15px;font-weight:500;color:#1a3a6b">${fmt(amtNum)}円</span>
        <span style="font-size:10px;color:#8a9ab5">海上運賃合計</span>
      </div>`:amtNum?`<span style="font-size:15px;font-weight:500;color:#1a3a6b">${fmt(amtNum)}円</span>`:`<span style="font-size:15px;font-weight:500;color:#aaa">-</span>`;
    const dateStr=e.date?e.date.replace(/-/g,'/'):'';
    return`<div class="est-card" onclick="viewEst(${i})" style="cursor:pointer">
      <div style="display:flex;flex-direction:column;gap:4px">
        <div style="font-size:11px;color:#8a9ab5;font-weight:500;font-family:monospace">No. ${e.no}</div>
        <div style="font-size:14px;font-weight:600;color:#1a2a44">${(e.customer||'（宛先未入力）').replace(/\n/g,' ')}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap">
          ${typeBadge(e.type)}
          <span style="font-size:11px;color:#5a6a82;background:#f0f4fa;padding:2px 8px;border-radius:99px;display:inline-flex;align-items:center;gap:3px"><i class="ti ti-calendar" style="font-size:10px"></i>${dateStr}</span>
          ${e.created?`<span style="font-size:11px;background:#e8eef7;color:#1a3a6b;padding:2px 8px;border-radius:99px;display:inline-flex;align-items:center;gap:3px"><i class="ti ti-user" style="font-size:10px"></i>${e.created}</span>`:''}
        </div>
      </div>
      <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        ${amtLabel}
        <div style="display:flex;gap:6px">
          <button class="btn sm" onclick="event.stopPropagation();editEst(${i})"><i class="ti ti-edit"></i>修正</button>
          <button class="btn sm" onclick="event.stopPropagation();copyEst(${i})" title="この見積書をコピーして新規作成"><i class="ti ti-copy"></i>コピー</button>
          <button class="btn sm pdf" onclick="event.stopPropagation();printEst(${i})"><i class="ti ti-printer"></i>PDF印刷</button>
          <button class="btn sm danger" onclick="event.stopPropagation();delEst(${i})"><i class="ti ti-trash"></i></button>
        </div>
      </div>
    </div>`;
  }).join('');
  const noResult=filtered.length===0&&q?`<div class="empty" style="padding:32px 20px"><i class="ti ti-search-off" style="font-size:28px;display:block;margin-bottom:8px;opacity:.3"></i>「${q}」に一致する見積書はありません</div>`:filtered.length===0?`<div class="empty" style="padding:32px 20px"><i class="ti ti-calendar-off" style="font-size:28px;display:block;margin-bottom:8px;opacity:.3"></i>この年度の見積書はありません</div>`:'';
  const panel=document.getElementById('listPanel');
  if(panel)panel.innerHTML=cards+noResult;
  const cnt=document.querySelector('.list-count');
  if(cnt)cnt.textContent=filtered.length+'件'+(q||S.fiscalYear?'／'+S.estimates.length+'件中':'');
}

function updDeliveryAddr(val){
  const idx=S.selIdx!==null?S.selIdx:0;
  if(!S.estimates[idx])return;
  S.estimates[idx].deliveryAddr=val;
  sv();
  const docName=S.tab==='receipt'?'受領書':'納品書';
  const prev=document.getElementById('docPreview');
  if(prev)prev.innerHTML=buildPrintDoc(S.estimates[idx],docName,val);
}

function renderDocTab(docType){
  const names={receipt:'受領書',delivery:'納品書'};
  const name=names[docType];
  if(!S.estimates.length)return`<div class="empty"><i class="ti ti-file-off"></i>見積書を先に作成してください</div>`;
  const idx=S.selIdx!==null?S.selIdx:0;
  const e=S.estimates[idx];
  const addr=e.deliveryAddr||'';
  const list=S.estimates.map((est,i)=>`<div class="est-card${i===idx?' sel':''}" onclick="S.selIdx=${i};render()" style="display:block;margin-bottom:6px;padding:10px 12px">
    <div style="font-size:11px;color:#1a3a6b;font-weight:500">No. ${est.no}</div>
    <div style="font-size:13px;font-weight:500;margin:2px 0">${(est.customer||'（未入力）').replace(/\n/g,' ')}</div>
    ${typeBadge(est.type)}

let _pendingPDFData=null;
let _pendingPDFName=null;
let _editReceivedIdx=null;

function openAddReceived(){
  _pendingPDFData=null;_pendingPDFName=null;_editReceivedIdx=null;
  const m=document.getElementById('addReceivedModal');
  if(!m)return;
  m.style.display='flex';
  document.getElementById('modalIcon').className='ti ti-file-upload';
  document.getElementById('modalTitle').textContent='受領見積書を追加';
  document.getElementById('pdfRequired').style.display='';
  document.getElementById('pdfOptional').style.display='none';
  document.getElementById('rSupplier').value='';
  document.getElementById('rDate').value=today();
  document.getElementById('rAmount').value='';
  document.getElementById('rType').value='';
  document.getElementById('rRegistrant').value='';
  document.getElementById('rMemo').value='';
  document.getElementById('dropLabel').textContent='クリックまたはドラッグ＆ドロップでPDFを選択';
  const dz=document.getElementById('dropZone');
  if(dz){dz.style.borderColor='#c8d4e0';dz.style.background='#fafbfc';}
  const fi=document.getElementById('pdfFileInput');
  if(fi)fi.value='';
}
function editReceived(i){
  const r=S.receivedEstimates[i];
  _pendingPDFData=null;_pendingPDFName=null;_editReceivedIdx=i;
  const m=document.getElementById('addReceivedModal');
  if(!m)return;
  m.style.display='flex';
  document.getElementById('modalIcon').className='ti ti-edit';
  document.getElementById('modalTitle').textContent='受領見積書を修正';
  document.getElementById('pdfRequired').style.display='none';
  document.getElementById('pdfOptional').style.display='';
  document.getElementById('rSupplier').value=r.supplier||'';  document.getElementById('rDate').value=r.date||today();
  document.getElementById('rAmount').value=r.amount||'';  document.getElementById('rType').value=r.type||'';  document.getElementById('rRegistrant').value=r.registrant||'';  document.getElementById('rMemo').value=r.memo||'';
  const lbl=document.getElementById('dropLabel');
  if(lbl)lbl.innerHTML=r.fileName?`<i class="ti ti-file-text" style="color:#1a3a6b"></i> ${r.fileName}（登録済み）`
    :'クリックまたはドラッグ＆ドロップで新しいPDFを選択';
  const dz=document.getElementById('dropZone');
  if(dz){dz.style.borderColor=r.fileName?'#1a3a6b':'#c8d4e0';dz.style.background=r.fileName?'#f0f4fc':'#fafbfc';}
  const fi=document.getElementById('pdfFileInput');
  if(fi)fi.value='';
}
function closeAddReceived(){
  const m=document.getElementById('addReceivedModal');
  if(m)m.style.display='none';
  _editReceivedIdx=null;
}
function handlePDFDrop(ev){
  ev.preventDefault();
  const dz=document.getElementById('dropZone');
  dz.style.borderColor='#c8d4e0';dz.style.background='#fafbfc';
  const file=ev.dataTransfer.files[0];
  if(file&&file.type==='application/pdf')loadPDFFile(file);
  else alert('PDFファイルを選択してください');
}
function handlePDFSelect(input){
  const file=input.files[0];
  if(file)loadPDFFile(file);
}
function loadPDFFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    _pendingPDFData=e.target.result;
    _pendingPDFName=file.name;
    const lbl=document.getElementById('dropLabel');
    if(lbl)lbl.innerHTML=`<i class="ti ti-check" style="color:#27ae60"></i> ${file.name} （${(file.size/1024).toFixed(0)} KB）`;
    const dz=document.getElementById('dropZone');
    if(dz){dz.style.borderColor='#27ae60';dz.style.background='#f0faf4';}
  };
  reader.readAsDataURL(file);
}
function saveReceived(){
  const isEdit=_editReceivedIdx!==null;
  if(!isEdit&&!_pendingPDFData){alert('PDFファイルを選択してください');return;}
  const supplier=document.getElementById('rSupplier').value.trim();
  if(!supplier){alert('取引先名を入力してください');return;}
  if(isEdit){
    const r=S.receivedEstimates[_editReceivedIdx];
    r.supplier=supplier;
    r.date=document.getElementById('rDate').value;
    r.amount=document.getElementById('rAmount').value.trim();
    r.type=document.getElementById('rType').value;
    r.registrant=document.getElementById('rRegistrant').value.trim();
    r.memo=document.getElementById('rMemo').value.trim();
    if(_pendingPDFData){r.pdfData=_pendingPDFData;r.fileName=_pendingPDFName;}
    r.updatedAt=nowJST();
  }else{
    const entry={
      supplier,
      date:document.getElementById('rDate').value,
      amount:document.getElementById('rAmount').value.trim(),
      type:document.getElementById('rType').value,
      registrant:document.getElementById('rRegistrant').value.trim(),
      memo:document.getElementById('rMemo').value.trim(),
      fileName:_pendingPDFName,
      pdfData:_pendingPDFData,
      savedAt:nowJST()
    };
    S.receivedEstimates.unshift(entry);
  }
  svR().then(()=>{closeAddReceived();render();});
}
async function delReceived(i){
  if(!confirm('削除しますか？'))return;
  S.receivedEstimates.splice(i,1);
  await svR();render();
}
function viewReceivedPDF(i){
  const r=S.receivedEstimates[i];
  if(!r||!r.pdfData)return;
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${r.supplier} - ${r.date}</title><style>body,html{margin:0;padding:0;height:100%;background:#555}iframe{width:100%;height:100%;border:none}</style></head><body><iframe src="${r.pdfData}"></iframe></body></html>`);
  w.document.close();
}
function downloadReceivedPDF(i){
  const r=S.receivedEstimates[i];
  if(!r||!r.pdfData)return;
  const a=document.createElement('a');
  a.href=r.pdfData;
  a.download=r.fileName||'見積書.pdf';
  a.click();
}

  // ── ① 見積一覧
  var s1=sec('ti-list-details','① 見積一覧',

    +row('絞り込み検索','検索ボックスに文字を入力すると <b>会社名・見積番号・日付・金額・作成者・種別</b> をリアルタイムで絞り込みます。'+btn('×')+' で検索をクリアできます。')

    +row('各ボタンの役割',
      '<div style="display:flex;flex-direction:column;gap:7px;margin-top:4px">'
      +'<div>'+btn('修正')+'　内容を編集モードで開きます。</div>'
      +'<div>'+btn('📋 コピー')+'　内容を複製して新しい見積書を作成します。見積番号・日付は自動更新されます。似た内容の見積書を続けて作る際に便利です。</div>'
      +'<div>'+btn('🖨 PDF印刷')+'　その見積書を印刷します。</div>'
      +'<div>'+btn('🗑 削除')+'　確認後に削除します。<b>削除したデータは復元できません。</b></div>'

    +'<div style="font-weight:600;color:#1a3a6b;font-size:12px;margin-bottom:10px">入力カードの説明</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px;font-size:13px;color:#444;line-height:1.8">'
    +'<div><b>📋 基本情報</b>　作成日・宛先（会社名）・照会番号を入力します。宛先は改行して複数行も入力できます（改行なしの場合は1行で表示）。承認・調査・作成の担当者名も入力でき、「作成」欄はPDFと一覧の両方に反映されます。</div>'
    +'<div><b>📋 条件</b>　種別ごとの取引条件を入力します。各項目は複数行入力できます。「その他」欄は自由記述です。</div>'
    +'<div><b>📋 品目明細</b>（塩・内販のみ）　品名・規格・数量・単位・単価を入力すると金額が自動計算されます。'+btn('行追加')+' で複数行入力できます。</div>'
    +'<div><b>📋 海上輸送詳細</b>（回漕のみ）　使用船舶・航路・海上運賃①②③・付帯条件を入力します。各運賃には航程名（例：2日航程）と金額を自由に入力でき、入力済みの運賃のみPDFに出力されます。</div>'
    +'<div><b>📋 備考</b>　PDF下部に印刷される注記欄です。</div>'
    +'</div>'
    +'</div>'
    +row(btn('💾 保存'),'入力内容をクラウドに保存します。<b>保存を押さないとデータが消えます。</b> こまめに保存してください。')

    +row(btn('一覧へ戻る'),'保存せずに一覧へ戻ります。未保存の内容は失われます。')
    +note('⚠ 「新規作成」タブを押すたびに種別選択画面からスタートします。作成中の場合は必ず先に「保存」してから他のタブへ移動してください。')
  );

  // ── ③ 受領書・納品書
  var s3=sec('ti-receipt','③ 受領書 ／ 納品書',
    row('概要','保存済みの見積書をもとに <b>受領書</b> または <b>納品書</b> を自動生成して印刷できます。内容を改めて入力する必要はありません。')
    +row('使い方',
      '① 画面左の一覧から対象の見積書を選択します。<br>'
      +'② 右側にプレビューが表示されます。内容を確認してください。<br>'
      +'③ '+btn('🖨 PDF印刷')+' を押すと印刷ダイアログが開きます。')
    +row('受領書の文言','「下記の通り確かに受領致しました。」の挨拶文が自動で挿入されます。')
    +row('納品書の文言','「下記の通り納品致しましたので、ご査収のほどよろしくお願い申し上げます。」の挨拶文が自動で挿入されます。')
    +note('⚠ 先に「新規作成」で見積書を保存してからご利用ください。見積書が1件もない場合は書類を生成できません。')
  );

  // ── ④ 受領見積書
  var s4=sec('ti-inbox','④ 受領見積書',
    row('概要','取引先から受け取った見積書（PDF）を登録・管理します。システム内に保存し、いつでも確認・ダウンロードできます。')
    +row('PDFを登録する',
      '① 右上の '+btn('＋ PDFを追加')+' を押します。<br>'
      +'② 開いたウィンドウでPDFをドラッグ＆ドロップ、またはクリックして選択します。<br>'
      +'③ 取引先名（必須）・日付・金額・登録者・メモを入力して保存します。')
    +row('絞り込み検索','<b>取引先名・日付・金額・種別・メモ・登録者</b> で検索できます。')
    +row('各ボタンの役割',
      '<div style="display:flex;flex-direction:column;gap:7px;margin-top:4px">'
      +'<div>'+btn('✏ 修正')+'　取引先名・日付・金額・登録者・メモを編集します。PDFを差し替えたい場合のみ再選択します。</div>'
      +'<div>'+btn('👁 表示')+'　PDFを新しいタブでプレビュー表示します。</div>'
      +'<div>'+btn('⬇ ダウンロード')+'　PDFを元のファイル名でダウンロードします。</div>'
      +'<div>'+btn('🗑 削除')+'　確認後に削除します。元に戻せません。</div>'
      +'</div>')
    +note('⚠ PDFデータはクラウド（Firestore）に保存されます。ファイルサイズが大きい場合（目安：数MB以上）は保存できないことがあります。その場合はメモのみ記録し、PDFは別途フォルダで管理してください。')
  );

  // ── ⑤ データ管理・ログイン
  var s5=sec('ti-database','⑤ データ管理・ログインについて',
    row('保存場所','データはクラウド（Firebase Firestore）に保存されます。ログイン中であれば <b>複数のPC・ブラウザから同じデータ</b> にアクセスできます。')
    +row('ログイン','メールアドレスとパスワードでログインします。セッションは維持されるため、通常は毎回ログインする必要はありません。')
    +row('保存のタイミング',btn('💾 保存')+' を押したときだけ保存されます。入力中に他のタブへ移動したり画面を閉じると <b>未保存の内容は消えます。</b> こまめに保存してください。')
    +row('ユーザー管理（管理者のみ）','「設定」タブ → 「ユーザー管理」からアカウントの追加・削除・パスワード変更ができます。管理者権限を持つユーザーのみ操作できます。')
    +ok('✅ データはクラウドに保存されるため、PCが変わってもデータは引き継がれます。ただし必要に応じてPDF印刷でバックアップを取ることをおすすめします。')
  );

  // ── ⑥ よくある質問
  var s6=sec('ti-message-circle-question','⑥ よくある質問（FAQ）',
    row('見積書を間違えて削除した','削除したデータは復元できません。定期的にPDF印刷でバックアップをとってください。')
    +row('PDFがうまく印刷できない','ブラウザの印刷設定で「用紙サイズ：A4」「余白：なし」「背景のグラフィック：オン」を確認してください。')
    +row('見積番号を変更したい','見積番号は自動採番のため変更できません。内容のみ修正してください。')
    +row('回漕の海上運賃を3つ入力したい','「海上輸送詳細」カードに海上運賃①②③の入力欄があります。航程名（例：2日航程）と金額を自由に入力できます。入力した分だけPDFに反映されます。')
    +row('ログインできなくなった','管理者に連絡してパスワードのリセットを依頼してください。管理者が「設定」タブのユーザー管理から対応できます。')
    +note('その他ご不明な点は社内システム担当までご連絡ください。')
  );

  return '<div style="max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:16px">'
    +'<div style="background:linear-gradient(135deg,#1a3a6b 0%,#2a5298 100%);border-radius:12px;padding:22px 28px;color:#fff">'
    +'<div style="font-size:18px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:10px"><i class="ti ti-help-circle" style="font-size:22px"></i>操作手順・機能説明</div>'
    +'<div style="font-size:13px;opacity:.85;line-height:1.8">共栄商事　見積管理システムの使い方をまとめています。はじめての方はまず「基本の流れ」をご確認ください。</div>'
    +'</div>'
    +intro
    +s1+s2+s3+s4+s5+s6
    +'</div>';
}

// ── 起動処理 ──────────────────────────────────────────────────
if(FB_READY){
  // Firebase Auth: セッション継続チェック
  fbAuth.onAuthStateChanged(async (user)=>{
    if(user && !AUTH.loggedIn){
      // 前回のセッションが残っている場合は自動ログイン
      const meta = await getUserMeta(user.uid) || {};
      AUTH={loggedIn:true,currentUser:{id:user.email,name:meta.name||user.email,uid:user.uid},isAdmin:!!meta.isAdmin};
      onLoginSuccess();
    } else if(!user && !AUTH.loggedIn){
      showLogin();
    }
  });
}else{
  // localStorageモード
  initAdminIfNeeded();
  showLogin();
}
</script>
